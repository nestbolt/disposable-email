name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      - name: Verify package contents
        run: |
          FILES=$(pnpm pack --dry-run 2>&1)
          echo "$FILES"

          # Ensure domains.json is included
          echo "$FILES" | grep -q "domains.json" || { echo "ERROR: domains.json missing from package"; exit 1; }

          # Ensure dist/index.js is included
          echo "$FILES" | grep -q "dist/index.js" || { echo "ERROR: dist/index.js missing from package"; exit 1; }

          # Ensure dist/index.d.ts is included
          echo "$FILES" | grep -q "dist/index.d.ts" || { echo "ERROR: dist/index.d.ts missing from package"; exit 1; }

      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
