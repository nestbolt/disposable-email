name: Update domains.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: "0"

      - name: Download new file
        run: curl -fsSL https://cdn.jsdelivr.net/gh/disposable/disposable-email-domains@master/domains.json --output domains.json

      - name: Validate domains.json
        run: |
          # Must be valid JSON
          node -e "JSON.parse(require('fs').readFileSync('domains.json', 'utf-8'))"

          # Must be a non-empty array
          COUNT=$(node -e "const d = JSON.parse(require('fs').readFileSync('domains.json', 'utf-8')); console.log(d.length)")
          echo "Domain count: $COUNT"

          # Sanity check: expect at least 50,000 domains
          if [ "$COUNT" -lt 50000 ]; then
            echo "ERROR: Domain count ($COUNT) is below minimum threshold (50,000). Aborting."
            exit 1
          fi

          # File size check: must be at least 500KB
          SIZE=$(wc -c < domains.json | tr -d ' ')
          echo "File size: $SIZE bytes"
          if [ "$SIZE" -lt 500000 ]; then
            echo "ERROR: File size ($SIZE bytes) is suspiciously small. Aborting."
            exit 1
          fi

      - name: Determine next patch version
        id: versioning
        run: |
          echo "next_patch=$(git describe --tags --abbrev=0 | awk -F. '{OFS="."; $NF+=1; print $0}')" >> $GITHUB_OUTPUT

      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          file_pattern: domains.json
          commit_message: "[AUTO] Update domains.json"
          tagging_message: ${{ steps.versioning.outputs.next_patch }}
